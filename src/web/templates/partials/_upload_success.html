<div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl p-6 animate-[fadeSlideUp_0.3s_ease-out]">
    <div class="flex items-start gap-4">
        <div class="flex-shrink-0">
            <div class="w-10 h-10 bg-green-100 dark:bg-green-900/40 rounded-full flex items-center justify-center">
                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
        </div>
        <div class="flex-1">
            <h3 class="text-lg font-semibold text-green-800 dark:text-green-300">
                Invoice Created Successfully
            </h3>
            <p class="mt-1 text-sm text-green-700 dark:text-green-400">
                {% if invoice_number %}
                Invoice <span class="font-mono font-medium">{{ invoice_number }}</span> has been created from the uploaded PDF.
                {% else %}
                The invoice has been created from the uploaded PDF.
                {% endif %}
            </p>
            <div class="mt-4 flex gap-3">
                <button
                    type="button"
                    hx-get="/upload/form"
                    hx-target="#upload-form-container"
                    hx-swap="innerHTML"
                    class="px-4 py-2 bg-green-100 dark:bg-green-900/40 hover:bg-green-200 dark:hover:bg-green-900/60 text-green-800 dark:text-green-300 font-medium rounded-lg transition-colors text-sm flex items-center gap-2"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Upload Another
                </button>
                <button
                    type="button"
                    onclick="document.getElementById('upload-form-container').innerHTML = ''; if(typeof updateMainScroll === 'function') updateMainScroll();"
                    class="px-4 py-2 text-green-700 dark:text-green-400 hover:text-green-900 dark:hover:text-green-200 font-medium transition-colors text-sm"
                >
                    Close
                </button>
            </div>
        </div>
    </div>
</div>

<!-- OOB swap to refresh invoice table -->
<div hx-get="/invoices" hx-trigger="load" hx-target="#invoice-tbody" hx-swap="innerHTML" style="display: none;"></div>
