<form
    hx-post="/krankenversicherung/add"
    hx-target="#health-insurance-tbody"
    hx-swap="afterbegin"
    hx-on::after-request="this.reset(); document.getElementById('health-insurance-form-container').innerHTML = ''; if(typeof updateMainScroll === 'function') updateMainScroll();"
    class="bg-white dark:bg-neutral-800 rounded-xl border-2 border-dashed border-rose-500 dark:border-rose-500/50 p-6 space-y-4 animate-[fadeSlideUp_0.3s_ease-out] mb-4"
>
    <div class="flex items-center justify-between border-b border-cream-dark dark:border-neutral-700 pb-4">
        <h3 class="font-display text-lg font-semibold text-charcoal dark:text-white">{{ _("health_insurance.record_payment") if _ else "Neue Krankenversicherungszahlung" }}</h3>
        <button
            type="button"
            onclick="document.getElementById('health-insurance-form-container').innerHTML = ''; if(typeof updateMainScroll === 'function') updateMainScroll();"
            class="text-slate hover:text-charcoal dark:hover:text-white transition-colors"
        >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <div class="grid grid-cols-3 gap-4">
        <!-- Insurance Type Toggle -->
        <div class="space-y-2 col-span-3">
            <label class="text-sm font-medium text-slate dark:text-gray-400">{{ _("health_insurance.insurance_type") if _ else "Versicherungsart" }}</label>
            <div class="flex gap-2">
                <label class="flex-1">
                    <input type="radio" name="insurance_type" value="gkv" class="peer hidden" onchange="filterProviders('gkv')">
                    <div class="peer-checked:bg-forest peer-checked:text-white peer-checked:border-forest cursor-pointer px-4 py-3 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-center font-medium text-charcoal dark:text-white hover:border-forest/50 transition-all">
                        <span class="text-sm">{{ _("insurance_type.gkv") if _ else "Gesetzlich (GKV)" }}</span>
                    </div>
                </label>
                <label class="flex-1">
                    <input type="radio" name="insurance_type" value="pkv" class="peer hidden" checked onchange="filterProviders('pkv')">
                    <div class="peer-checked:bg-forest peer-checked:text-white peer-checked:border-forest cursor-pointer px-4 py-3 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-center font-medium text-charcoal dark:text-white hover:border-forest/50 transition-all">
                        <span class="text-sm">{{ _("insurance_type.pkv") if _ else "Privat (PKV)" }}</span>
                    </div>
                </label>
            </div>
        </div>

        <!-- Provider -->
        <div class="space-y-1 col-span-2">
            <label class="text-sm font-medium text-slate dark:text-gray-400">{{ _("health_insurance.provider") if _ else "Versicherung" }}</label>
            <select
                name="provider_id"
                id="provider-select"
                required
                class="w-full px-4 py-2.5 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all"
            >
                <option value="">{{ _("health_insurance.select_provider") if _ else "Versicherung auswahlen..." }}</option>
                {% for provider in providers %}
                <option value="{{ provider.id }}" data-type="{{ provider.type.value }}">
                    {{ provider.short_name or provider.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Date -->
        <div class="space-y-1">
            <label class="text-sm font-medium text-slate dark:text-gray-400">{{ _("form.date") if _ else "Datum" }}</label>
            <input
                type="date"
                name="date"
                required
                value="{{ today }}"
                class="w-full px-4 py-2.5 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white font-mono focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all"
            >
        </div>

        <!-- Coverage Type -->
        <div class="space-y-1 col-span-2">
            <label class="text-sm font-medium text-slate dark:text-gray-400">{{ _("health_insurance.coverage_type") if _ else "Leistungsart" }}</label>
            <select
                name="coverage_type"
                required
                class="w-full px-4 py-2.5 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all"
            >
                {% for coverage in coverage_types %}
                <option value="{{ coverage.value }}">
                    {{ _("coverage." + coverage.value) if _ else coverage.value|replace("_", " ")|capitalize }}
                    {% if coverage.value == 'basis_krankenversicherung' or coverage.value == 'pflegepflichtversicherung' %}
                    ({{ _("health_insurance.unlimited") if _ else "unbegrenzt" }})
                    {% elif coverage.value == 'wahlleistungen' or coverage.value == 'zusatzversicherung' %}
                    ({{ _("health_insurance.limited") if _ else "begrenzt" }})
                    {% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Amount -->
        <div class="space-y-1">
            <label class="text-sm font-medium text-slate dark:text-gray-400">{{ _("form.amount") if _ else "Betrag (EUR)" }}</label>
            <input
                type="number"
                name="amount"
                step="0.01"
                min="0.01"
                required
                placeholder="0,00"
                class="w-full px-4 py-2.5 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white font-mono placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all"
            >
        </div>

        <!-- Has Krankengeld (GKV only) -->
        <div class="space-y-1 col-span-3" id="krankengeld-container">
            <label class="flex items-center gap-3 cursor-pointer">
                <input
                    type="checkbox"
                    name="has_krankengeld"
                    value="true"
                    class="w-4 h-4 rounded border-cream-dark dark:border-neutral-600 text-rose-500 focus:ring-rose-500"
                >
                <span class="text-sm text-charcoal dark:text-white">
                    {{ _("health_insurance.has_krankengeld") if _ else "GKV mit Krankengeldanspruch" }}
                    <span class="text-xs text-slate dark:text-gray-400">({{ _("health_insurance.krankengeld_reduction") if _ else "4% Abzug vom Absetzungsbetrag" }})</span>
                </span>
            </label>
        </div>

        <!-- Policy Number -->
        <div class="space-y-1 col-span-2">
            <label class="text-sm font-medium text-slate dark:text-gray-400">{{ _("health_insurance.policy_number") if _ else "Versicherungsnummer" }}</label>
            <input
                type="text"
                name="policy_number"
                placeholder="{{ _('health_insurance.policy_number_placeholder') if _ else 'Optional' }}"
                class="w-full px-4 py-2.5 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all"
            >
        </div>

        <!-- Notes -->
        <div class="space-y-1 col-span-3">
            <label class="text-sm font-medium text-slate dark:text-gray-400">{{ _("form.notes") if _ else "Notizen" }}</label>
            <input
                type="text"
                name="notes"
                placeholder="{{ _('health_insurance.notes_placeholder') if _ else 'Optionale Notizen zur Zahlung' }}"
                class="w-full px-4 py-2.5 bg-cream dark:bg-neutral-700 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all"
            >
        </div>
    </div>

    <div class="flex justify-end gap-3 pt-2">
        <button
            type="button"
            onclick="document.getElementById('health-insurance-form-container').innerHTML = ''; if(typeof updateMainScroll === 'function') updateMainScroll();"
            class="px-4 py-2 text-slate hover:text-charcoal dark:hover:text-white font-medium transition-colors"
        >
            {{ _("action.cancel") if _ else "Abbrechen" }}
        </button>
        <button
            type="submit"
            class="px-6 py-2 bg-rose-500 hover:bg-rose-600 text-white font-medium rounded-lg transition-colors flex items-center gap-2"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            {{ _("action.save") if _ else "Speichern" }}
        </button>
    </div>
</form>

<script>
    // Filter providers based on insurance type selection
    function filterProviders(type) {
        const select = document.getElementById('provider-select');
        const options = select.querySelectorAll('option[data-type]');

        options.forEach(option => {
            if (type === '' || option.dataset.type === type) {
                option.style.display = '';
            } else {
                option.style.display = 'none';
            }
        });

        // Reset selection
        select.value = '';

        // Show/hide Krankengeld checkbox based on type
        const krankengeldContainer = document.getElementById('krankengeld-container');
        if (type === 'pkv') {
            krankengeldContainer.style.display = 'none';
        } else {
            krankengeldContainer.style.display = '';
        }
    }

    // Initialize with PKV filter (default selection)
    filterProviders('pkv');
</script>
