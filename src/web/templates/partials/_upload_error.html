<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-6 animate-[fadeSlideUp_0.3s_ease-out]">
    <div class="flex items-start gap-4">
        <div class="flex-shrink-0">
            <div class="w-10 h-10 bg-red-100 dark:bg-red-900/40 rounded-full flex items-center justify-center">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>
        <div class="flex-1">
            <h3 class="text-lg font-semibold text-red-800 dark:text-red-300">
                Upload Failed
            </h3>
            <p class="mt-1 text-sm text-red-700 dark:text-red-400">
                {{ error }}
            </p>
            <div class="mt-4 flex gap-3">
                <button
                    type="button"
                    hx-get="/upload/form"
                    hx-target="#upload-form-container"
                    hx-swap="innerHTML"
                    class="px-4 py-2 bg-red-100 dark:bg-red-900/40 hover:bg-red-200 dark:hover:bg-red-900/60 text-red-800 dark:text-red-300 font-medium rounded-lg transition-colors text-sm"
                >
                    Try Again
                </button>
                <button
                    type="button"
                    onclick="document.getElementById('upload-form-container').innerHTML = ''; if(typeof updateMainScroll === 'function') updateMainScroll();"
                    class="px-4 py-2 text-red-700 dark:text-red-400 hover:text-red-900 dark:hover:text-red-200 font-medium transition-colors text-sm"
                >
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>
