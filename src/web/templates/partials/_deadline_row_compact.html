<!-- Swiss Timetable Row (HTMX Response) -->
<button
    id="deadline-row-{{ deadline.deadline_id }}"
    hx-post="/api/deadline/{{ deadline.deadline_id }}/toggle?compact=true"
    hx-target="#deadline-row-{{ deadline.deadline_id }}"
    hx-swap="outerHTML"
    class="w-full text-left relative overflow-hidden rounded-lg transition-all duration-200
           hover:scale-[1.02] active:scale-[0.98] group cursor-pointer
           {% if deadline.completed %}
           bg-sage/5 dark:bg-sage/10
           {% elif deadline.days_until < 0 %}
           bg-terracotta/5 dark:bg-terracotta/10
           {% elif deadline.days_until <= 7 %}
           bg-terracotta/5 dark:bg-terracotta/10
           {% else %}
           bg-cream dark:bg-neutral-700/50 hover:bg-cream-dark/50 dark:hover:bg-neutral-700
           {% endif %}"
    title="{{ _('deadline.click_to_toggle') if _ else 'Klicken zum Umschalten' }}"
>
    <!-- Type Color Stripe (Left Edge) -->
    <div class="absolute left-0 top-0 bottom-0 w-1 rounded-l-lg
        {% if deadline.completed %}bg-sage
        {% elif deadline.type == 'umsatzsteuer' %}bg-amber
        {% elif deadline.type == 'einkommensteuer' %}bg-forest
        {% elif deadline.type == 'zusammenfassende_meldung' %}bg-blue-500
        {% else %}bg-slate{% endif %}"></div>

    <div class="pl-3 pr-2 py-2 flex items-center gap-2">
        <!-- Countdown (Hero Element) -->
        <div class="w-8 h-8 rounded-md flex items-center justify-center shrink-0
            {% if deadline.completed %}bg-sage/10
            {% elif deadline.days_until < 0 %}bg-terracotta/15
            {% elif deadline.days_until <= 7 %}bg-terracotta/10
            {% elif deadline.days_until <= 30 %}bg-amber/10
            {% else %}bg-slate/10 dark:bg-neutral-600/50{% endif %}">
            {% if deadline.completed %}
            <svg class="w-4 h-4 text-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
            {% else %}
            <span class="font-mono text-xs font-bold
                {% if deadline.days_until < 0 %}text-terracotta
                {% elif deadline.days_until <= 7 %}text-terracotta
                {% elif deadline.days_until <= 30 %}text-amber-dark dark:text-amber
                {% else %}text-slate dark:text-gray-400{% endif %}">{{ deadline.days_until }}<span class="text-[9px] font-medium opacity-60">d</span></span>
            {% endif %}
        </div>

        <!-- Stacked Content -->
        <div class="flex-1 min-w-0 overflow-hidden">
            <!-- Type Badge + Short Name -->
            <div class="flex items-center gap-1.5">
                <span class="shrink-0 text-[9px] font-bold uppercase tracking-wide
                    {% if deadline.type == 'umsatzsteuer' %}text-amber-dark dark:text-amber
                    {% elif deadline.type == 'einkommensteuer' %}text-forest dark:text-forest-light
                    {% elif deadline.type == 'zusammenfassende_meldung' %}text-blue-600 dark:text-blue-400
                    {% else %}text-slate{% endif %}">
                    {% if deadline.type == 'umsatzsteuer' %}USt{% elif deadline.type == 'einkommensteuer' %}ESt{% elif deadline.type == 'zusammenfassende_meldung' %}ZM{% else %}{{ deadline.type[:2]|upper }}{% endif %}
                </span>
                <span class="text-[10px] text-charcoal dark:text-white font-medium truncate {% if deadline.completed %}line-through opacity-60{% endif %}">
                    {{ deadline.name | replace('USt-Voranmeldung ', '') | replace('Einkommensteuer-Vorauszahlung ', 'Q') | replace('Zusammenfassende Meldung ', '') }}
                </span>
            </div>

            <!-- Date + Amount Row -->
            <div class="flex items-center gap-1.5 mt-0.5">
                <span class="font-mono text-[9px] text-slate dark:text-gray-400 {% if deadline.completed %}opacity-60{% endif %}">
                    {{ deadline.date.strftime('%d.%m') }}
                </span>
                {% if deadline.amount and not deadline.completed %}
                <span class="text-[9px] font-semibold text-terracotta">
                    €{{ "{:,.0f}".format(deadline.amount).replace(",", ".") }}
                </span>
                {% endif %}
                {% if deadline.days_until < 0 and not deadline.completed %}
                <span class="ml-auto flex items-center gap-0.5 text-[8px] font-bold text-terracotta uppercase tracking-wide">
                    <span class="w-1 h-1 rounded-full bg-terracotta animate-pulse"></span>
                    {{ _("deadline.overdue") if _ else "Überfällig" }}
                </span>
                {% endif %}
            </div>
        </div>

        <!-- Hover Hint -->
        <div class="shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
            {% if deadline.completed %}
            <svg class="w-3 h-3 text-slate/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
            {% else %}
            <svg class="w-3 h-3 text-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            {% endif %}
        </div>
    </div>
</button>
