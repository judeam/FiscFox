<div class="bg-cream/50 dark:bg-neutral-700/50 rounded-lg border border-cream-dark dark:border-neutral-600 p-4 mt-2 client-form-wrapper">
    <div class="flex items-center justify-between mb-3">
        <h4 class="text-sm font-semibold text-charcoal dark:text-white">{{ _("client.new_client") if _ else "Neuer Kunde" }}</h4>
        <button
            type="button"
            onclick="this.closest('.client-form-wrapper').remove()"
            class="text-slate hover:text-charcoal dark:hover:text-white transition-colors"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <form
        hx-post="/clients/add"
        hx-swap="outerHTML"
        hx-target="closest .client-form-wrapper"
        class="space-y-3"
    >
        <!-- Mark as inline form for special handling -->
        <input type="hidden" name="inline" value="true">
        <div class="grid grid-cols-2 gap-3">
            <!-- Name (Required) -->
            <div class="col-span-2">
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.name") if _ else "Name" }} *</label>
                <input
                    type="text"
                    name="name"
                    required
                    minlength="1"
                    maxlength="200"
                    placeholder="{{ _('client.name_placeholder') if _ else 'z.B. SAP SE' }}"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
            </div>

            <!-- Street -->
            <div class="col-span-2">
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.street") if _ else "Straße" }}</label>
                <input
                    type="text"
                    name="street"
                    maxlength="200"
                    placeholder="{{ _('client.street_placeholder') if _ else 'Musterstraße 123' }}"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
            </div>

            <!-- ZIP Code -->
            <div>
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.zip_code") if _ else "PLZ" }}</label>
                <input
                    type="text"
                    name="zip_code"
                    maxlength="20"
                    placeholder="10115"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
            </div>

            <!-- City -->
            <div>
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.city") if _ else "Stadt" }}</label>
                <input
                    type="text"
                    name="city"
                    maxlength="100"
                    placeholder="Berlin"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
            </div>

            <!-- Country -->
            <div>
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.country") if _ else "Land" }}</label>
                <select
                    name="country"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
                    <option value="DE" selected>{{ _("country.DE") if _ else "Deutschland" }} (DE)</option>
                    <option value="AT">{{ _("country.AT") if _ else "Österreich" }} (AT)</option>
                    <option value="CH">{{ _("country.CH") if _ else "Schweiz" }} (CH)</option>
                    <option value="US">{{ _("country.US") if _ else "USA" }} (US)</option>
                    <option value="GB">{{ _("country.GB") if _ else "Großbritannien" }} (GB)</option>
                    <option value="FR">{{ _("country.FR") if _ else "Frankreich" }} (FR)</option>
                    <option value="NL">{{ _("country.NL") if _ else "Niederlande" }} (NL)</option>
                    <option value="SE">{{ _("country.SE") if _ else "Schweden" }} (SE)</option>
                    <option value="IT">{{ _("country.IT") if _ else "Italien" }} (IT)</option>
                    <option value="ES">{{ _("country.ES") if _ else "Spanien" }} (ES)</option>
                </select>
            </div>

            <!-- VAT ID -->
            <div>
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.vat_id") if _ else "USt-IdNr." }}</label>
                <input
                    type="text"
                    name="vat_id"
                    maxlength="20"
                    placeholder="DE123456789"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white font-mono placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
            </div>

            <!-- Email -->
            <div>
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.email") if _ else "E-Mail" }}</label>
                <input
                    type="email"
                    name="email"
                    maxlength="200"
                    placeholder="buchhaltung@example.com"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
            </div>

            <!-- Phone -->
            <div>
                <label class="text-xs font-medium text-slate dark:text-gray-400">{{ _("client.phone") if _ else "Telefon" }}</label>
                <input
                    type="tel"
                    name="phone"
                    maxlength="30"
                    placeholder="+49 30 12345678"
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-neutral-800 border border-cream-dark dark:border-neutral-600 rounded-lg text-charcoal dark:text-white placeholder:text-slate/50 focus:outline-none focus:ring-2 focus:ring-forest focus:border-transparent transition-all"
                >
            </div>
        </div>

        <div class="flex justify-end gap-2 pt-2 border-t border-cream-dark dark:border-neutral-600">
            <button
                type="button"
                onclick="this.closest('.client-form-wrapper').remove()"
                class="px-3 py-1.5 text-sm text-slate hover:text-charcoal dark:hover:text-white font-medium transition-colors"
            >
                {{ _("action.cancel") if _ else "Abbrechen" }}
            </button>
            <button
                type="submit"
                class="px-4 py-1.5 text-sm bg-forest hover:bg-forest-dark text-white font-medium rounded-lg transition-colors flex items-center gap-1"
            >
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                {{ _("client.save") if _ else "Speichern" }}
            </button>
        </div>
    </form>
</div>
